name: Schema validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate version consistency
        run: |
          npm run validate:version-consistency

      - name: Validate ChatGPT project source pack
        run: |
          npm run build:project-pack

      - name: Validate valid Builder_Context_Package fixtures
        run: |
          for file in tests/valid/builder_context_package*.json examples/smart-home-connector/builder_context_package.json; do
            npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/builder-context-package.schema.json -d "$file"
          done

      - name: Ensure invalid Builder_Context_Package fixtures fail
        run: |
          for file in tests/invalid/*.json; do
            case "$file" in
              tests/invalid/checkpoint_*.json) continue ;;
              tests/invalid/intake_result_*.json) continue ;;
              tests/invalid/session_state_*.json) continue ;;
              tests/invalid/repair_packet*.json) continue ;;
            esac
            if npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/builder-context-package.schema.json -d "$file"; then
              echo "Invalid fixture unexpectedly passed validation: $file"
              exit 1
            else
              echo "Invalid fixture correctly failed validation: $file"
            fi
          done

      - name: Run cross-field package validation
        run: |
          npm run validate:cross-field

      - name: Ensure cross-field invalid fixtures fail
        run: |
          for file in tests/invalid-cross-field/*.json; do
            if node scripts/validate-package.mjs "$file"; then
              echo "Cross-field invalid fixture unexpectedly passed: $file"
              exit 1
            else
              echo "Cross-field invalid fixture correctly failed: $file"
            fi
          done

      - name: Validate checkpoint fixtures
        run: |
          npm run validate:checkpoint

      - name: Validate intake result fixtures
        run: |
          npm run validate:intake-result

      - name: Validate session-state fixtures
        run: |
          npm run validate:session-state

      - name: Validate repair packet fixtures
        run: |
          npm run validate:repair-packet

      - name: Validate layout and completion gates
        run: |
          npm run validate:layout-check
          npm run validate:completion-gate

      - name: Validate Elementor asset generation gate
        run: |
          npm run validate:elementor-asset-generation

      - name: Validate runtime safety gate fixtures
        run: |
          npm run validate:unit-strategy
          npm run validate:batch-compaction
          npm run validate:cognitive-mode-hint

      - name: Compile runtime safety gate schemas
        run: |
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/unit-strategy-check.schema.json
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/batch-compaction-check.schema.json
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/cognitive-mode-hint.schema.json
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/layout-check.schema.json
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/completion-gate.schema.json
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/elementor-asset-generation-check.schema.json

      - name: Compile session-state schema
        run: |
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/session-state.schema.json -r schemas/checkpoint.schema.json -r schemas/evidence-record.schema.json -r schemas/repair-packet.schema.json

      - name: Compile repair-packet schema
        run: |
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/repair-packet.schema.json

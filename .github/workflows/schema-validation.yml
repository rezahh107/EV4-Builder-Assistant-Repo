name: Schema validation

on:
  push:
    paths:
      - 'schemas/**'
      - 'tests/**'
      - 'examples/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/schema-validation.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'tests/**'
      - 'examples/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/schema-validation.yml'

jobs:
  validate-builder-context-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate valid Builder_Context_Package fixtures
        run: |
          npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            --strict=false \
            -s schemas/builder-context-package.schema.json \
            -d tests/valid/builder_context_package.json

          npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            --strict=false \
            -s schemas/builder-context-package.schema.json \
            -d examples/smart-home-connector/builder_context_package.json

      - name: Ensure invalid Builder_Context_Package fixtures fail
        run: |
          for file in tests/invalid/*.json; do
            case "$file" in
              tests/invalid/checkpoint_missing_id.json) continue ;;
            esac

            if npx --yes ajv-cli@5 validate \
              --spec=draft2020 \
              --strict=false \
              -s schemas/builder-context-package.schema.json \
              -d "$file"; then
              echo "Invalid fixture unexpectedly passed validation: $file"
              exit 1
            else
              echo "Invalid fixture correctly failed validation: $file"
            fi
          done

      - name: Run cross-field package validation
        run: |
          npm run validate:cross-field

      - name: Validate checkpoint fixtures
        run: |
          npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            --strict=false \
            -s schemas/checkpoint.schema.json \
            -d tests/valid/checkpoint.json

          if npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            --strict=false \
            -s schemas/checkpoint.schema.json \
            -d tests/invalid/checkpoint_missing_id.json; then
            echo "Invalid checkpoint fixture unexpectedly passed validation."
            exit 1
          else
            echo "Invalid checkpoint fixture correctly failed validation."
          fi

      - name: Compile session-state schema
        run: |
          npx --yes ajv-cli@5 compile \
            --spec=draft2020 \
            --strict=false \
            -s schemas/session-state.schema.json \
            -r schemas/checkpoint.schema.json

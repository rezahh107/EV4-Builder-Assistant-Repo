name: Schema validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate ChatGPT project source pack
        run: |
          npm run build:project-pack

      - name: Validate valid Builder_Context_Package fixtures
        run: |
          for file in tests/valid/builder_context_package*.json examples/smart-home-connector/builder_context_package.json; do
            npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/builder-context-package.schema.json -d "$file"
          done

      - name: Ensure invalid Builder_Context_Package fixtures fail
        run: |
          for file in tests/invalid/*.json; do
            case "$file" in
              tests/invalid/checkpoint_*.json) continue ;;
              tests/invalid/intake_result_*.json) continue ;;
              tests/invalid/session_state_*.json) continue ;;
            esac
            if npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/builder-context-package.schema.json -d "$file"; then
              echo "Invalid fixture unexpectedly passed validation: $file"
              exit 1
            else
              echo "Invalid fixture correctly failed validation: $file"
            fi
          done

      - name: Run cross-field package validation
        run: |
          npm run validate:cross-field

      - name: Ensure cross-field invalid fixtures fail
        run: |
          for file in tests/invalid-cross-field/*.json; do
            if node scripts/validate-package.mjs "$file"; then
              echo "Cross-field invalid fixture unexpectedly passed: $file"
              exit 1
            else
              echo "Cross-field invalid fixture correctly failed: $file"
            fi
          done

      - name: Validate checkpoint fixtures
        run: |
          npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/checkpoint.schema.json -d tests/valid/checkpoint.json
          if npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/checkpoint.schema.json -d tests/invalid/checkpoint_missing_session_id.json; then
            echo "Invalid checkpoint fixture unexpectedly passed validation."
            exit 1
          else
            echo "Invalid checkpoint fixture correctly failed."
          fi

      - name: Validate intake result fixtures
        run: |
          for file in tests/valid/intake_result_*.json; do
            npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/intake-result.schema.json -d "$file"
          done
          for file in tests/invalid/intake_result_*.json; do
            if npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/intake-result.schema.json -d "$file"; then
              echo "Invalid intake result fixture unexpectedly passed validation: $file"
              exit 1
            else
              echo "Invalid intake result correctly failed: $file"
            fi
          done

      - name: Validate session-state fixtures
        run: |
          npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/session-state.schema.json -r schemas/checkpoint.schema.json -d tests/valid/session_state_mode_state.json
          if npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s schemas/session-state.schema.json -r schemas/checkpoint.schema.json -d tests/invalid/session_state_workflow_runtime_mismatch.json; then
            echo "Invalid session-state fixture unexpectedly passed validation."
            exit 1
          else
            echo "Invalid session-state fixture correctly failed."
          fi

      - name: Compile session-state schema
        run: |
          npx --yes ajv-cli@5 compile --spec=draft2020 --strict=false -s schemas/session-state.schema.json -r schemas/checkpoint.schema.json

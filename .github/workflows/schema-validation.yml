name: Schema validation

on:
  push:
    paths:
      - 'schemas/**'
      - 'tests/**'
      - '.github/workflows/schema-validation.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'tests/**'
      - '.github/workflows/schema-validation.yml'

jobs:
  validate-builder-context-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate valid Builder_Context_Package fixture
        run: |
          npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            --strict=false \
            -s schemas/builder-context-package.schema.json \
            -d tests/valid/builder_context_package.json

      - name: Ensure missing selected_candidate_id fixture is invalid
        run: |
          if npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            --strict=false \
            -s schemas/builder-context-package.schema.json \
            -d tests/invalid/missing_selected_candidate.json; then
            echo "Invalid fixture unexpectedly passed validation."
            exit 1
          else
            echo "Invalid fixture correctly failed validation."
          fi

      - name: Compile session-state schema
        run: |
          npx --yes ajv-cli@5 compile \
            --spec=draft2020 \
            --strict=false \
            -s schemas/session-state.schema.json \
            -r schemas/checkpoint.schema.json
